<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大蒜粒机研所行业早报</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-orange: #FF9500;
            --ios-red: #FF3B30;
            --ios-purple: #AF52DE;
            --ios-pink: #FF2D55;
            --ios-yellow: #FFCC00;
            --ios-teal: #5AC8FA;
            --ios-gray: #8E8E93;
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-text: #000000;
            --ios-text-secondary: #3C3C43;
            --ios-text-tertiary: #C7C7CC;
            --ios-separator: #C6C6C8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, sans-serif; 
            background: var(--ios-bg);
            min-height: 100vh; 
            padding: 20px;
            color: var(--ios-text);
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header { 
            text-align: center; 
            margin-bottom: 32px; 
            padding: 40px 20px; 
            background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%); 
            border-radius: 20px; 
            color: #fff;
            box-shadow: 0 4px 20px rgba(0,122,255,0.3);
        }
        .header h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        .header .tagline { font-size: 15px; opacity: 0.9; font-weight: 400; }
        .header .date-badge { 
            display: inline-block; 
            margin-top: 16px; 
            padding: 10px 24px; 
            background: rgba(255,255,255,0.2); 
            border-radius: 20px; 
            font-size: 14px; 
            backdrop-filter: blur(10px);
            font-weight: 500;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        
        .card { 
            background: var(--ios-card); 
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .card:hover { 
            transform: scale(1.02); 
            box-shadow: 0 8px 24px rgba(0,0,0,0.12); 
        }
        
        .card-header { 
            padding: 20px; 
            background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
            color: #fff;
        }
        .card-date { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .card-count { 
            font-size: 12px; 
            background: rgba(255,255,255,0.25); 
            padding: 4px 12px; 
            border-radius: 12px; 
            font-weight: 600;
        }
        
        .card-preview { padding: 16px 20px; }
        .card-preview-item { 
            display: flex; 
            align-items: flex-start; 
            gap: 10px; 
            padding: 8px 0;
            border-bottom: 1px solid var(--ios-separator);
        }
        .card-preview-item:last-child { border-bottom: none; }
        .card-preview-num {
            font-size: 12px; font-weight: 700; color: #fff; 
            background: var(--ios-blue);
            width: 20px; height: 20px; border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; 
            min-width: 20px;
        }
        .card-preview-text { font-size: 14px; color: var(--ios-text-secondary); line-height: 1.4; }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: var(--ios-card);
            border-radius: 20px;
            width: 100%;
            max-width: 700px;
            max-height: 85vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: modalIn 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .modal-header {
            padding: 20px 24px;
            background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-title { font-size: 20px; font-weight: 700; }
        .modal-close {
            width: 32px; height: 32px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .modal-close:hover { background: rgba(255,255,255,0.3); }
        
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            max-height: calc(85vh - 80px);
        }
        
        .section { margin-bottom: 24px; }
        .section:last-child { margin-bottom: 0; }
        .section-title { 
            font-size: 15px; font-weight: 700; color: var(--ios-text); 
            padding-bottom: 12px;
            margin-bottom: 16px;
            border-bottom: 2px solid var(--ios-blue);
            display: flex; align-items: center; gap: 8px;
        }
        
        .news-item { 
            padding: 16px 0; 
            border-bottom: 1px solid var(--ios-separator); 
        }
        .news-item:last-child { border-bottom: none; }
        
        .news-tag { 
            display: inline-block;
            font-size: 11px; 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-weight: 600; 
            margin-bottom: 8px;
        }
        .tag-focus { background: var(--ios-red); color: #fff; }
        .tag-funding { background: var(--ios-blue); color: #fff; }
        .tag-robotics { background: var(--ios-purple); color: #fff; }
        .tag-tech { background: var(--ios-green); color: #fff; }
        .tag-x { background: var(--ios-teal); color: #fff; }
        
        .news-title { font-size: 16px; font-weight: 600; color: var(--ios-text); line-height: 1.4; margin-bottom: 8px; }
        .news-desc { font-size: 14px; color: var(--ios-text-secondary); line-height: 1.6; margin-bottom: 10px; }
        .news-source { font-size: 13px; color: var(--ios-blue); }
        .news-source a { color: var(--ios-blue); text-decoration: none; }
        .news-source a:hover { text-decoration: underline; }
        
        .funding-item {
            background: var(--ios-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .funding-item:last-child { margin-bottom: 0; }
        .funding-title { font-size: 15px; font-weight: 600; color: var(--ios-text); margin-bottom: 8px; }
        .funding-detail { font-size: 13px; color: var(--ios-text-secondary); line-height: 1.5; }
        
        .footer { text-align: center; padding: 32px; color: var(--ios-text-tertiary); font-size: 13px; }
        
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 26px; }
            .modal { max-height: 90vh; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 大蒜粒机研所</h1>
            <p class="tagline">AI · 机器人 · 科技行业早报</p>
            <div class="date-badge">📅 每日 7:00 自动更新</div>
        </div>
        
        <div class="grid" id="reportGrid"></div>
        
        <div class="footer">
            <p>🤖 大蒜粒机研所行业早报 | 每天 7:00 自动更新</p>
            <p>数据来源: Brave Search + RSS + X/Twitter</p>
        </div>
    </div>
    
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle"></span>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>
    
    <script>
        const reports = [
            {
                date: "2026年2月17日",
                count: 10,
                focus: ["印度AI峰会开幕", "OpenAI收购OpenClaw", "Qualcomm展示机器人"],
                news: [
                    // Web Search + X 来源
                    { type: "focus", title: "印度AI Impact Summit 2026开幕", desc: "2月16日至20日，全球首届南方AI峰会在新德里举办，莫迪总理主持开幕式，Sam Altman、Sundar Pichai等CEO出席。", source: "The Hindu", url: "https://www.thehindu.com" },
                    { type: "focus", title: "OpenAI收购OpenClaw创始人", desc: "OpenAI聘请OpenClaw创始人Peter Steinberger领导多智能体开发，这是继与Musk法律纠纷后的重大人事胜利。", source: "LatestLY", url: "https://www.latestly.com" },
                    { type: "focus", title: "英伟达黄仁勋取消印度行程", desc: "英伟达CEO黄仁勋因故取消印度AI峰会行程，Sam Altman和Sundar Pichai确认出席。", source: "Arab News", url: "https://www.arabnews.pk" },
                    
                    // 机器人进展
                    { type: "robotics", title: "Qualcomm展示AI机器人栈", desc: "高通在印度AI峰会上展示完整机器人技术栈，这是其在印度市场的首次亮相。", source: "Business Standard", url: "https://www.business-standard.com" },
                    { type: "robotics", title: "AGIBOT加速进入泰国市场", desc: "AGIBOT通过多日战略展示加速进入泰国市场，部署可用于旅游和数字化转型的机器人。", source: "Yahoo Finance", url: "https://sg.finance.yahoo.com" },
                    { type: "robotics", title: "英国发布世界最快开发机器人", desc: "英国公司Humanoid发布19分钟纪录片，展示世界最快开发的人形机器人过程。", source: "Interesting Engineering", url: "https://interestingengineering.com" },
                    
                    // X/Twitter 热点头条
                    { type: "x", title: "Musk vs OpenAI审判文件公开", desc: "特斯拉CEO Musk与OpenAI CEO Altman的审判文件于4月27日开审，文档现已公开。", source: "Times of India", url: "https://timesofindia.indiatimes.com" },
                    { type: "x", title: "xAI发布Grok语音转录功能", desc: "xAI在Android上推出Grok语音转录功能，与Google Assistant竞争。", source: "LatestLY", url: "https://www.latestly.com" },
                    
                    // 行业数据
                    { type: "tech", title: "内存短缺影响AI供应链", desc: "内存短缺正在收紧AI供应链，电力输送成为数据中心新瓶颈，政府开始制定可执行的AI规则。", source: "Tech Startups", url: "https://techstartups.com" },
                    { type: "tech", title: "HBM3-HBM4竞争加剧", desc: "本周HBM3和HBM4产能变化，AI PC市场份额变化，TSMC执行领导层变动。", source: "Digitimes", url: "https://www.digitimes.com" }
                ]
            }
        ];
        
        function renderCards() {
            const grid = document.getElementById('reportGrid');
            grid.innerHTML = reports.map((r, i) => `
                <div class="card" onclick="openModal(${i})">
                    <div class="card-header">
                        <div class="card-date">📅 ${r.date}</div>
                        <div class="card-count">${r.count} 条</div>
                    </div>
                    <div class="card-preview">
                        ${r.focus.slice(0,3).map((f, j) => `
                            <div class="card-preview-item">
                                <span class="card-preview-num">${j+1}</span>
                                <span class="card-preview-text">${f}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        function openModal(index) {
            const r = reports[index];
            document.getElementById('modalTitle').textContent = r.date;
            
            let html = '';
            
            const focus = r.news.filter(n => n.type === 'focus');
            if (focus.length) {
                html += '<div class="section"><div class="section-title">🔥 今日焦点</div>';
                focus.forEach(n => {
                    html += `<div class="news-item">
                        <span class="news-tag tag-focus">焦点</span>
                        <div class="news-title">${n.title}</div>
                        <div class="news-desc">${n.desc}</div>
                        <div class="news-source">📰 ${n.source}</div>
                    </div>`;
                });
                html += '</div>';
            }
            
            const robotics = r.news.filter(n => n.type === 'robotics');
            if (robotics.length) {
                html += '<div class="section"><div class="section-title">🤖 机器人进展</div>';
                robotics.forEach(n => {
                    html += `<div class="news-item">
                        <span class="news-tag tag-robotics">机器人</span>
                        <div class="news-title">${n.title}</div>
                        <div class="news-desc">${n.desc}</div>
                        <div class="news-source">📰 ${n.source}</div>
                    </div>`;
                });
                html += '</div>';
            }
            
            const x = r.news.filter(n => n.type === 'x');
            if (x.length) {
                html += '<div class="section"><div class="section-title">🐦 X/Twitter热点</div>';
                x.forEach(n => {
                    html += `<div class="news-item">
                        <span class="news-tag tag-x">X</span>
                        <div class="news-title">${n.title}</div>
                        <div class="news-desc">${n.desc}</div>
                        <div class="news-source">📰 ${n.source}</div>
                    </div>`;
                });
                html += '</div>';
            }
            
            const other = r.news.filter(n => n.type === 'tech');
            if (other.length) {
                html += '<div class="section"><div class="section-title">📊 行业动态</div>';
                other.forEach(n => {
                    html += `<div class="news-item">
                        <span class="news-tag tag-tech">行业</span>
                        <div class="news-title">${n.title}</div>
                        <div class="news-desc">${n.desc}</div>
                        <div class="news-source">📰 ${n.source}</div>
                    </div>`;
                });
                html += '</div>';
            }
            
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
        }
        
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
        
        renderCards();
    </script>
</body>
</html>
