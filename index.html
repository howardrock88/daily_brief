<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大蒜粒机研所行业早报</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-orange: #FF9500;
            --ios-red: #FF3B30;
            --ios-purple: #AF52DE;
            --ios-pink: #FF2D55;
            --ios-yellow: #FFCC00;
            --ios-teal: #5AC8FA;
            --ios-gray: #8E8E93;
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-text: #000000;
            --ios-text-secondary: #3C3C43;
            --ios-text-tertiary: #C7C7CC;
            --ios-separator: #C6C6C8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, sans-serif; 
            background: var(--ios-bg);
            min-height: 100vh; 
            padding: 20px;
            color: var(--ios-text);
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header { 
            text-align: center; 
            margin-bottom: 32px; 
            padding: 40px 20px; 
            background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%); 
            border-radius: 20px; 
            color: #fff;
            box-shadow: 0 4px 20px rgba(0,122,255,0.3);
        }
        .header h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        .header .tagline { font-size: 15px; opacity: 0.9; font-weight: 400; }
        .header .date-badge { 
            display: inline-block; 
            margin-top: 16px; 
            padding: 10px 24px; 
            background: rgba(255,255,255,0.2); 
            border-radius: 20px; 
            font-size: 14px; 
            backdrop-filter: blur(10px);
            font-weight: 500;
        }
        
        .history-header {
            font-size: 18px;
            font-weight: 600;
            color: var(--ios-text);
            margin-bottom: 16px;
            padding-left: 8px;
            border-left: 4px solid var(--ios-blue);
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        
        .card { 
            background: var(--ios-card); 
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .card:hover { 
            transform: scale(1.02); 
            box-shadow: 0 8px 24px rgba(0,0,0,0.12); 
        }
        
        .card-header { 
            padding: 20px; 
            background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
            color: #fff;
        }
        .card-date { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .card-count { 
            font-size: 12px; 
            background: rgba(255,255,255,0.25); 
            padding: 4px 12px; 
            border-radius: 12px; 
            font-weight: 600;
        }
        
        .card-preview { padding: 16px 20px; }
        .card-preview-item { 
            display: flex; 
            align-items: flex-start; 
            gap: 10px; 
            padding: 8px 0;
            border-bottom: 1px solid var(--ios-separator);
        }
        .card-preview-item:last-child { border-bottom: none; }
        .card-preview-num {
            font-size: 12px; font-weight: 700; color: #fff; 
            background: var(--ios-blue);
            width: 20px; height: 20px; border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; 
            min-width: 20px;
        }
        .card-preview-text { font-size: 14px; color: var(--ios-text-secondary); line-height: 1.4; }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: var(--ios-card);
            border-radius: 20px;
            width: 100%;
            max-width: 700px;
            max-height: 85vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: modalIn 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .modal-header {
            padding: 20px 24px;
            background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-title { font-size: 20px; font-weight: 700; }
        .modal-close {
            width: 32px; height: 32px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .modal-close:hover { background: rgba(255,255,255,0.3); }
        
        .modal-body {
            padding: 24px;
            overflow-y: auto;
            max-height: calc(85vh - 80px);
        }
        
        .section { margin-bottom: 24px; }
        .section:last-child { margin-bottom: 0; }
        .section-title { 
            font-size: 15px; font-weight: 700; color: var(--ios-text); 
            padding-bottom: 12px;
            margin-bottom: 16px;
            border-bottom: 2px solid var(--ios-blue);
            display: flex; align-items: center; gap: 8px;
        }
        
        .news-item { 
            padding: 16px 0; 
            border-bottom: 1px solid var(--ios-separator); 
        }
        .news-item:last-child { border-bottom: none; }
        
        .news-tag { 
            display: inline-block;
            font-size: 11px; 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-weight: 600; 
            margin-bottom: 8px;
        }
        .tag-focus { background: var(--ios-red); color: #fff; }
        .tag-funding { background: var(--ios-blue); color: #fff; }
        .tag-robotics { background: var(--ios-purple); color: #fff; }
        .tag-tech { background: var(--ios-green); color: #fff; }
        .tag-x { background: var(--ios-teal); color: #fff; }
        
        .news-title { font-size: 16px; font-weight: 600; color: var(--ios-text); line-height: 1.4; margin-bottom: 8px; }
        .news-desc { font-size: 14px; color: var(--ios-text-secondary); line-height: 1.6; margin-bottom: 10px; }
        .news-source { font-size: 13px; color: var(--ios-blue); }
        .news-source a { color: var(--ios-blue); text-decoration: none; }
        .news-source a:hover { text-decoration: underline; }
        
        .footer { text-align: center; padding: 32px; color: var(--ios-text-tertiary); font-size: 13px; }
        
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 26px; }
            .modal { max-height: 90vh; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 大蒜粒机研所</h1>
            <p class="tagline">AI · 机器人 · 科技行业早报</p>
            <div class="date-badge">📅 每日 7:00 自动更新</div>
        </div>
        
        <div class="history-header">📚 历史早报</div>
        <div class="grid" id="reportGrid"></div>
        
        <div class="footer">
            <p>🤖 大蒜粒机研所行业早报 | 每天 7:00 自动更新</p>
            <p>数据来源: Brave Search + RSS + X/Twitter</p>
        </div>
    </div>
    
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle"></span>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>
    
    <script>
        const reports = [
            {
                date: "2026年2月18日",
                count: 8,
                news: [
                    { type: "focus", title: "印度AI峰会召开 全球科技巨头齐聚新德里", desc: "2月16日开幕的印度AI峰会吸引OpenAI、Anthropic、NVIDIA、Google、Microsoft高管出席，OpenAI CEO Sam Altman、Google DeepMind CEO Demis Hassabis、Anthropic CEO Dario Amodei将发表演讲。印度总理莫迪力图让印度在AI领域占据领导地位。", source: "Reuters", url: "https://www.reuters.com/business/retail-consumer/openai-google-india-hosts-global-ai-summit-2026-02-16/" },
                    { type: "focus", title: "央视春晚变"科技秀" 六家机器人品牌集中亮相", desc: "除夕夜春晚舞台上，宇树科技、银河通用、智元机器人等六家人形机器人企业登台。宇树G1和H2完成全球首次全自主人形机器人集群武术表演，Unitree G1售价超过20万元。", source: "36氪", url: "https://36kr.com/p/3688239515217796" },
                    { type: "funding", title: "Anthropic完成300亿美元G轮融资 估值3800亿美元", desc: "2月12日，Anthropic宣布完成300亿美元G轮融资，融资后估值达到3800亿美元。这是AI领域最大规模融资之一。", source: "Wikipedia", url: "https://en.wikipedia.org/wiki/Anthropic" },
                    { type: "funding", title: "Meta扩大NVIDIA芯片订单 2026年AI投资达1350亿美元", desc: "Meta宣布2026年AI投资预算最高1350亿美元，并与NVIDIA达成数十亿美元芯片协议，用于数据中心建设。", source: "CNBC", url: "https://www.cnbc.com/2026/02/17/meta-nvidia-deal-ai-data-center-chips.html" },
                    { type: "robotics", title: "人形机器人2026大爆发 304起融资379亿元", desc: "根据IT桔子数据，2025年具身智能领域融资超304起，总额379亿元，是2024年的4倍。宇树科技已完成IPO辅导冲刺A股"人形机器人第一股"。", source: "新浪财经", url: "https://finance.sina.com.cn/stock/t/2026-02-18/doc-inhnfaym8202102.shtml" },
                    { type: "tech", title: "NVIDIA GB300 NVL72推理性能提升50倍", desc: "NVIDIA在印度AI峰会上宣布GB300 NVL72推理性能提升50倍，每百万token成本降低35倍。", source: "@nvidia", url: "https://x.com/nvidia/status/2023918736881623505" },
                    { type: "x", title: "Grok 4.20数学推理能力超越GPT-5.2 Pro", desc: "用户测试显示，Grok 4.20在解决复杂数学问题仅需30秒，而GPT-5.2 Pro需要9分钟。", source: "@elonmusk", url: "https://x.com/elonmusk/status/2024046968272453668" },
                    { type: "x", title: "Sam Altman祝贺Benchmark合伙人", desc: "Sam Altman在X上发文祝贺老友加入Benchmark，Thrive X基金规模超100亿美元。", source: "@sama", url: "https://x.com/sama/status/2023839310764802349" }
                ]
            },
            {
                date: "2026年2月17日",
                count: 8,
                news: [
                    { type: "focus", title: "印度AI Impact Summit 2026开幕", desc: "2月16日至20日，全球首届南方AI峰会在新德里Bharat Mandapam举办，莫迪总理主持开幕式。20位国家领导人和45个部长级代表团参会，超过600家初创企业参展，预计吸引25万访客。Sam Altman和Sundar Pichai确认出席，黄仁勋因故取消行程。", source: "The Hindu", url: "https://www.thehindu.com/news/national/pm-modi-to-inaugurate-india-ai-impact-expo-on-february-16/article70635191.ece" },
                    { type: "focus", title: "OpenAI聘请OpenClaw创始人Peter Steinberger", desc: "OpenAI宣布聘请OpenClaw创始人Peter Steinberger领导多智能体开发项目。Steinberger将负责多智能体系统的研发工作，这是继OpenAI与Elon Musk法律纠纷后的重大人事任命，体现了OpenAI在多智能体领域的战略布局。", source: "LatestLY", url: "https://www.latestly.com/technology/openai-hires-openclaw-founder-peter-steinberger-to-lead-multi-agent-development-ceo-sam-altman-announces-7315682.html" },
                    { type: "x", title: "Musk vs OpenAI审判文件将于4月27日开审", desc: "特斯拉CEO Elon Musk与OpenAI CEO Sam Altman之间的审判文件已于近日公开。庭审将于4月27日开始，这场关于OpenAI非营利使命的争议将迎来法律解决。OpenAI还指控Musk支持一个名为CANI的非营利组织作为其代理。", source: "Times of India", url: "https://timesofindia.indiatimes.com/technology/social/elon-musk-replies-to-internal-email-where-he-asked-nvidia-ceo-jensen-huang-for-early-unit-of-its-supercomputer/articleshow/128421710.cms" },
                    { type: "x", title: "xAI发布Grok语音转录功能", desc: "xAI在Android平台推出Grok语音转录功能，用户可以直接通过语音与AI助手交互。这一功能进一步扩展了Grok的移动端能力，与Google Assistant和Siri等语音助手展开竞争。OpenAI Codex用户数量年初至今增长超过3倍。", source: "LatestLY", url: "https://www.latestly.com/socially/technology/grok-ai-voice-to-text-dictation-feature-launched-by-elon-musks-xai-on-android-check-details-7316045.html" },
                    { type: "robotics", title: "Qualcomm在印度AI峰会展示机器人技术栈", desc: "美国芯片巨头高通在印度AI峰会上首次展示其完整的机器人技术栈。高通展示了基于其芯片的机器人解决方案，包括面向消费电子和工业应用的人形机器人平台，标志着其正式进军印度机器人市场。", source: "Business Standard", url: "https://www.business-standard.com/technology/tech-news/qualcomm-showcases-ai-humanoid-robots-at-india-ai-impact-summit-sneak-peek-126021600675_1.html" },
                    { type: "robotics", title: "AGIBOT加速进入泰国机器人市场", desc: "具身智能机器人公司AGIBOT通过多日战略展示加速进入泰国市场。展示内容包括面向智慧旅游和数字化转型的部署就绪型人形机器人，泰国政府对此表现出浓厚兴趣，双方将开展深度合作。", source: "Yahoo Finance", url: "https://sg.finance.yahoo.com/news/agibot-accelerates-thailand-market-entry-070000604.html" },
                    { type: "tech", title: "内存短缺正在收紧AI供应链", desc: "过去24小时的技术行业分析显示，内存短缺正在加剧AI供应链紧张。电力输送成为数据中心新的瓶颈，各国政府开始从抽象的AI原则转向具有约束力的可执行规则，AI监管正在走向实质化。", source: "Tech Startups", url: "https://techstartups.com/2026/02/16/top-tech-news-today-february-16-2026/" },
                    { type: "tech", title: "HBM3-HBM4内存竞争加剧", desc: "本周 DIGITIMES Asia 最受关注的报道涵盖HBM3和HBM4产能变化、AI PC市场份额波动、替代内存架构发展、晶圆代工策略调整以及台积电高管变动。内存技术的竞争正在影响整个AI硬件生态。", source: "Digitimes", url: "https://www.digitimes.com/news/a20260216VL204/hbm3-ai-pc-hbm4-digitimes-asia-intel.html" }
                ]
            },
            {
                date: "2026年2月16日",
                count: 10,
                news: [
                    { type: "focus", title: "英伟达发布财报超预期", desc: "英伟达发布最新季度财报，营收和利润均超出市场预期。数据中心业务继续保持强劲增长态势，AI芯片需求持续攀升。财报发布后，英伟达股价在盘后交易中上涨超过5%，再次刷新历史新高。", source: "Reuters", url: "https://www.reuters.com" },
                    { type: "focus", title: "OpenAI推出GPT-4.5预览版", desc: "OpenAI推出GPT-4.5预览版，在推理能力和多模态理解方面有显著提升。该版本目前向部分开发者开放测试，预计将在未来几周内全面上线。", source: "OpenAI", url: "https://openai.com" },
                    { type: "robotics", title: "Figure AI发布新一代人形机器人", desc: "Figure AI发布了新一代人形机器人Figure 02，在运动控制和人机交互方面有重大突破。新机器人具备更灵活的关节设计。", source: "TechCrunch", url: "https://techcrunch.com" },
                    { type: "robotics", title: "波士顿动力Atlas机器人完成首次自主搬运", desc: "波士顿动力的Atlas机器人完成了首次完全自主的仓库搬运任务，标志着双足机器人在工业应用方面迈出了重要一步。", source: "IEEE Spectrum", url: "https://spectrum.ieee.org" },
                    { type: "tech", title: "美国商务部发布AI芯片出口新规", desc: "美国商务部发布了新的AI芯片出口管制规定，对向特定国家出口先进AI芯片实施更严格的限制。", source: "Reuters", url: "https://www.reuters.com" },
                    { type: "tech", title: "Meta开源Llama 4基础模型", desc: "Meta宣布开源Llama 4基础模型，这是该公司迄今为止最强大的开源语言模型。", source: "Meta AI", url: "https://ai.meta.com" },
                    { type: "x", title: "Sam Altman透露下一代GPT开发进展", desc: "OpenAI CEO Sam Altman在社交媒体上透露，下一代GPT模型的开发进展顺利。", source: "X/Twitter", url: "https://twitter.com/sama" },
                    { type: "x", title: "英伟达黄仁勋谈AI算力需求", desc: "英伟达CEO黄仁勋在接受采访时表示，AI算力需求将在未来几年保持指数级增长。", source: "CNBC", url: "https://www.cnbc.com" },
                    { type: "tech", title: "Google发布Gemini Ultra 2.0", desc: "Google发布了Gemini Ultra 2.0版本，在多模态理解和生成方面有重大提升。", source: "Google", url: "https://blog.google" },
                    { type: "funding", title: "AI初创公司Anthropic获新融资", desc: "Anthropic获得新一轮数亿美元融资，估值超过200亿美元。", source: "TechCrunch", url: "https://techcrunch.com" }
                ]
            }
        ];
        
        function renderCards() {
            const grid = document.getElementById('reportGrid');
            grid.innerHTML = reports.map((r, i) => `
                <div class="card" onclick="openModal(${i})">
                    <div class="card-header">
                        <div class="card-date">📅 ${r.date}</div>
                        <div class="card-count">${r.count} 条</div>
                    </div>
                    <div class="card-preview">
                        ${r.news.slice(0,3).map((n, j) => `
                            <div class="card-preview-item">
                                <span class="card-preview-num">${j+1}</span>
                                <span class="card-preview-text">${n.title}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        function openModal(index) {
            const r = reports[index];
            document.getElementById('modalTitle').textContent = r.date;
            
            let html = '';
            
            const sections = [
                { key: 'focus', title: '🔥 今日焦点', tag: 'tag-focus' },
                { key: 'robotics', title: '🤖 机器人进展', tag: 'tag-robotics' },
                { key: 'x', title: '🐦 X/Twitter热点', tag: 'tag-x' },
                { key: 'tech', title: '📊 行业动态', tag: 'tag-tech' },
                { key: 'funding', title: '💰 融资动态', tag: 'tag-funding' }
            ];
            
            sections.forEach(section => {
                const items = r.news.filter(n => n.type === section.key);
                if (items.length) {
                    html += '<div class="section"><div class="section-title">' + section.title + '</div>';
                    items.forEach(n => {
                        html += `<div class="news-item">
                            <span class="news-tag ${section.tag}">${section.key === 'funding' ? '融资' : section.key}</span>
                            <div class="news-title">${n.title}</div>
                            <div class="news-desc">${n.desc}</div>
                            <div class="news-source"><a href="${n.url}" target="_blank">📰 ${n.source}</a></div>
                        </div>`;
                    });
                    html += '</div>';
                }
            });
            
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
        }
        
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
        
        renderCards();
    </script>
</body>
</html>
